<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Experience</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="imgs/logo_flash.png" type="image/png">
</head>
<body>

    <div class="loader"></div>

    <main class="container">
        <h1 class="flash-title">THE <span>FLASH</span></h1>

        <section class="videos-grid">
            <div class="video-wrapper">
                <iframe 
                    src="https://www.youtube.com/embed/zvYbI7kYYUM?si=QL0S0lyCRLGhz3Ed"
                    loading="lazy"    
                    title="Flash Intros" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    referrerpolicy="strict-origin-when-cross-origin" 
                    allowfullscreen>
                </iframe>
            </div>

            <div class="video-wrapper">
                <iframe 
                    src="https://www.youtube.com/embed/Li3vNEtM2no?si=oet0JmcqDjTIY_AA"
                    loading="lazy" 
                    title="Reverse Flash return" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    referrerpolicy="strict-origin-when-cross-origin" 
                    allowfullscreen>
                </iframe>
            </div>

            <div class="video-wrapper">
                <iframe 
                    src="https://www.youtube.com/embed/7xtqDagmrRs?si=zJ3ADT3GgchjqDKX"
                    loading="lazy" 
                    title="Enter Savitar" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    referrerpolicy="strict-origin-when-cross-origin" 
                    allowfullscreen>
                </iframe>
            </div>

            <div class="video-wrapper"> 
                <iframe 
                    src="https://www.youtube.com/embed/Cx883m4fcWY?si=q5NnHAS2jbBLg01P"
                    loading="lazy" 
                    title="Flash vs Zoom" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    referrerpolicy="strict-origin-when-cross-origin" 
                    allowfullscreen>
                </iframe>
            </div>

            <div class="video-wrapper"> 
                <iframe 
                    src="https://www.youtube.com/embed/uItmWSAauoQ?si=f81mCV0-DUqm4zOd"
                    loading="lazy" 
                    title="Barry Entra en la Speed Force" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" 
                    allowfullscreen>
                </iframe>
            </div>
            
            <div class="video-wrapper"> 
                <iframe 
                    src="https://www.youtube.com/embed/cD2IBxX9kXo?si=2KAYHzUHJNonlkur"
                    loading="lazy" 
                    title="Explicacion del flashpoint" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    referrerpolicy="strict-origin-when-cross-origin" 
                    allowfullscreen>
                </iframe>
            </div>
        </section>

        <h2>Velocistas</h2>
        <section class="gallery-grid">
            <div class="gallery-hero image-card">
                <p>Flash</p>
                <img src="imgs/flash.png" alt="Flash" class="reveal-img">
                <div class="glow"></div>
            </div>

            <div class="gallery-hero image-card">
                <p>Kid Flash</p>
                <img src="imgs/kid-flash.png" alt="Kid Flash" class="reveal-img">
                <div class="glow"></div>
            </div>

            <div class="gallery-hero image-card ">
                <p>Jay Garrick</p>
                <img src="imgs/jay.png"  alt="Jay Garrick" class="reveal-img">
              <div class="glow"></div>
            </div>

            <div class="gallery-villain image-card ">
                <p>Reverse Flash</p>
                <img src="imgs/reverse-flash.png" alt="Reverse Flash" class="reveal-img">
                <div class="glow"></div>
            </div>

            <div class="gallery-villain image-card villain">
                <p>Zoom</p>
                <img src="imgs/zoom.png" alt="Zoom" class="reveal-img">
                <div class="glow"></div>
            </div>

            <div class="gallery-villain image-card villain">
                <p>Savitar</p>
                <img src="imgs/savitar.png" alt="Savitar" class="reveal-img">
                <div class="glow"></div>
            </div>
        </section>


        <button id="speed-btn">¡ACTIVAR VELOCIDAD!</button>
    </main>

    <script src="script.js"></script>
</body>
</html>
